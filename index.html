<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>参加者ページ</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
  <h1>コインチェッカー</h1>
  <div id="qr-reader" style="width:300px;"></div>
  <p id="user-id"></p>
  <p>コイン残高: <span id="coin-count">--</span></p>
  <input type="text" id="nickname" placeholder="ニックネーム">
  <button id="update-nickname">ニックネーム更新</button>
  <p id="nickname-status"></p>
  <a href="ranking.html">▶ ランキングを見る</a>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, onValue, set, get } from "firebase/database";
    import { firebaseConfig } from "./firebase.js";

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let currentId = null;

    function onScanSuccess(decodedText) {
      currentId = decodedText;
      document.getElementById("user-id").textContent = `ID: ${currentId}`;
      const userRef = ref(db, `users/${currentId}`);

      get(userRef).then(snapshot => {
        if (!snapshot.exists()) {
          set(userRef, { coin: 10, nickname: "", retired: false });
        }
      });

      onValue(userRef, (snap) => {
        const data = snap.val();
        document.getElementById("coin-count").textContent = data.coin;
        document.getElementById("nickname").value = data.nickname || "";
      });
    }

    new Html5Qrcode("qr-reader").start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },
      onScanSuccess
    );

    document.getElementById("update-nickname").onclick = () => {
      if (!currentId) return;
      const nickname = document.getElementById("nickname").value;
      set(ref(db, `users/${currentId}/nickname`), nickname);
      document.getElementById("nickname-status").textContent = "更新しました";
    };
  </script>
</body>
</html>
